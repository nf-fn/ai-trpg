name: 古代遺跡の探索
description: 初心者向けの短編シナリオ
content: |
  # 古代遺跡の探索

  ## 導入
  辺境の村の近くで古代遺跡が発見された。村長はプレイヤーに遺跡の調査を依頼する。
  遺跡には財宝が眠っているという噂があるが、魔物も潜んでいるらしい。

  ## 登場NPC
  - 村長ゴルド: 温厚な老人。遺跡の調査報酬として金貨50枚を提示。
  - 商人リナ: 村の雑貨屋。冒険に必要な装備を売っている。
  - 謎の旅人カイ: 遺跡について何か知っているようだ。

  ## 遺跡の構造
  1. 入口の広間: 壁に古代文字が刻まれている
  2. 罠の通路: 床に圧力板の罠がある（敏捷判定で回避）
  3. 守護者の間: 石のゴーレムが待ち構えている（戦闘）
  4. 宝物庫: 古代の魔法の品が眠っている

  ## クリア条件
  宝物庫に到達し、遺跡の秘密を解き明かす
