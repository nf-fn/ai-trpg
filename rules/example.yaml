name: シンプルTRPG
description: 2D6ベースのシンプルなTRPGルール
content: |
  # シンプルTRPGルール

  ## 判定
  - 行動判定は2D6で行う
  - 目標値は通常7、難しい行動は9、非常に難しい行動は11
  - ゾロ目（同じ目が2つ）はクリティカル（自動成功）
  - 1ゾロはファンブル（自動失敗＋ペナルティ）

  ## 戦闘
  - 攻撃判定: 2D6 >= 目標値で命中
  - ダメージ: 武器ごとに固定値
  - HP が 0 になると戦闘不能

  ## キャラクター能力値
  - 体力・知力・敏捷・魅力（各1〜6）
  - 関連する能力値を判定にボーナスとして加算
